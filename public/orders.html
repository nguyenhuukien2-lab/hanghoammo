<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng của tôi - HangHoaMMO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="ai-chatbot.css">
    <style>
        .orders-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        .orders-header {
            margin-bottom: 30px;
        }

        .orders-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .orders-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .order-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .order-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 15px;
        }

        .order-code {
            font-weight: 600;
            color: #333;
        }

        .order-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .order-status.completed {
            background: #d4edda;
            color: #155724;
        }

        .order-status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .order-status.cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .order-items {
            margin-bottom: 15px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }

        .order-item-name {
            color: #333;
        }

        .order-item-price {
            font-weight: 600;
            color: #667eea;
        }

        .order-accounts {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .order-accounts h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .account-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .account-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }

        .account-info code {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            flex: 1;
        }

        .btn-copy {
            background: #667eea;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-copy:hover {
            background: #5568d3;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .order-date {
            color: #666;
            font-size: 14px;
        }

        .order-total {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .empty-orders {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-orders i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-orders h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .empty-orders p {
            color: #666;
            margin-bottom: 20px;
        }

        .btn-shop {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-shopping-bag"></i>
                <span>HangHoaMMO</span>
            </div>

            <nav class="nav">
                <a href="index.html">Trang chủ</a>
                <a href="products.html">Sản phẩm</a>
                <a href="orders.html" class="active">Đơn hàng</a>
                <a href="wallet.html" id="walletLink" style="display: none;">Ví tiền</a>
                <a href="blog.html">Blogs</a>
            </nav>

            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                </button>

                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>

                <div class="user-menu" id="userMenu">
                    <button class="user-btn" id="userBtn" onclick="openAuthModal('login')">
                        <i class="fas fa-user"></i>
                        <span>Đăng nhập</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Orders Container -->
    <div class="orders-container">
        <div class="orders-header">
            <h1>Đơn hàng của tôi</h1>
            <p>Quản lý và theo dõi đơn hàng của bạn</p>
        </div>

        <div class="orders-tabs">
            <button class="order-tab active" onclick="filterOrders('all')">Tất cả</button>
            <button class="order-tab" onclick="filterOrders('completed')">Hoàn thành</button>
            <button class="order-tab" onclick="filterOrders('pending')">Đang xử lý</button>
            <button class="order-tab" onclick="filterOrders('cancelled')">Đã hủy</button>
        </div>

        <div class="orders-list" id="ordersList">
            <!-- Orders will be loaded here -->
        </div>
    </div>

    <script src="script.js"></script>
    <script src="ai-chatbot.js"></script>
    <script>
        let allOrders = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', async function() {
            checkLoginStatus();
            
            const authToken = localStorage.getItem('authToken');
            if (!authToken) {
                window.location.href = 'index.html';
                return;
            }

            await loadOrders();
        });

        async function loadOrders() {
            try {
                const authToken = localStorage.getItem('authToken');
                const response = await fetch('/api/orders/my-orders', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const result = await response.json();

                if (result.success) {
                    allOrders = result.data;
                    renderOrders();
                } else {
                    showNotification(result.message || 'Lỗi khi tải đơn hàng', 'error');
                }
            } catch (error) {
                console.error('Load orders error:', error);
                showNotification('Lỗi kết nối!', 'error');
            }
        }

        function filterOrders(status) {
            currentFilter = status;
            
            // Update active tab
            document.querySelectorAll('.order-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('ordersList');
            
            let filteredOrders = allOrders;
            if (currentFilter !== 'all') {
                filteredOrders = allOrders.filter(order => order.status === currentFilter);
            }

            if (filteredOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-box-open"></i>
                        <h3>Chưa có đơn hàng</h3>
                        <p>Bạn chưa có đơn hàng nào trong danh sách này</p>
                        <a href="products.html" class="btn-shop">
                            <i class="fas fa-shopping-bag"></i> Mua sắm ngay
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredOrders.map(order => {
                const statusClass = order.status;
                const statusText = {
                    'completed': 'Hoàn thành',
                    'pending': 'Đang xử lý',
                    'cancelled': 'Đã hủy'
                }[order.status] || order.status;

                const orderDate = new Date(order.created_at).toLocaleString('vi-VN');

                let accountsHTML = '';
                if (order.order_items && order.order_items.some(item => item.accounts)) {
                    accountsHTML = `
                        <div class="order-accounts">
                            <h4>🎁 Tài khoản đã giao:</h4>
                            ${order.order_items.filter(item => item.accounts).map(item => `
                                <div class="account-item">
                                    <strong>${item.product_name}</strong>
                                    <div class="account-info">
                                        <span>Tài khoản:</span>
                                        <code>${item.accounts.username}</code>
                                        <button onclick="copyToClipboard('${item.accounts.username}')" class="btn-copy">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                    </div>
                                    <div class="account-info">
                                        <span>Mật khẩu:</span>
                                        <code>${item.accounts.password}</code>
                                        <button onclick="copyToClipboard('${item.accounts.password}')" class="btn-copy">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="order-code">Đơn hàng #${order.order_code || order.id}</div>
                            <div class="order-status ${statusClass}">${statusText}</div>
                        </div>

                        <div class="order-items">
                            ${order.order_items ? order.order_items.map(item => `
                                <div class="order-item">
                                    <div class="order-item-name">
                                        ${item.product_name} x${item.quantity}
                                    </div>
                                    <div class="order-item-price">
                                        ${formatPrice(item.product_price * item.quantity)}
                                    </div>
                                </div>
                            `).join('') : ''}
                        </div>

                        ${accountsHTML}

                        <div class="order-footer">
                            <div class="order-date">
                                <i class="fas fa-clock"></i> ${orderDate}
                            </div>
                            <div class="order-total">
                                Tổng: ${formatPrice(order.total)}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('Đã sao chép!', 'success');
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', { 
                style: 'currency', 
                currency: 'VND' 
            }).format(price);
        }
    </script>

    <!-- Dark Mode Toggle Button -->
    <button class="theme-toggle" onclick="toggleDarkMode()" title="Chuyển đổi chế độ tối">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>

    <script>
        // Dark mode functionality
        function toggleDarkMode() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                icon.className = 'fas fa-sun';
                localStorage.setItem('darkMode', 'enabled');
            } else {
                icon.className = 'fas fa-moon';
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        // Load dark mode preference
        document.addEventListener('DOMContentLoaded', function() {
            const darkMode = localStorage.getItem('darkMode');
            const icon = document.getElementById('theme-icon');
            
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
                icon.className = 'fas fa-sun';
            }
        });
    </script>
</body>
</html>
