<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - HangHoaMMO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo h1 { font-size: 24px; font-weight: 800; color: #4F46E5; }
        .logo p { color: #6B7280; font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9CA3AF; }
        .input-wrap input { width: 100%; padding: 13px 14px 13px 42px; border: 1.5px solid #E5E7EB; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .input-wrap input:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9CA3AF; cursor: pointer; }
        .btn { width: 100%; padding: 14px; background: #4F46E5; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: #4338CA; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .hint { font-size: 12px; color: #9CA3AF; margin-top: 6px; }
        .msg { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
        .msg.error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
        .msg.success { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
        .back { text-align: center; margin-top: 20px; font-size: 14px; color: #6B7280; }
        .back a { color: #4F46E5; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🔐 HangHoaMMO</h1>
        <p>Đặt lại mật khẩu mới</p>
    </div>

    <div id="msg" class="msg"></div>

    <form id="resetForm">
        <div class="form-group">
            <label>Mật khẩu mới</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="newPassword" placeholder="Tối thiểu 8 ký tự" required>
                <button type="button" class="toggle-pw" onclick="togglePw('newPassword','icon1')"><i class="fas fa-eye" id="icon1"></i></button>
            </div>
            <div class="hint">Ít nhất 8 ký tự, 1 chữ hoa, 1 chữ thường, 1 số</div>
        </div>
        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword','icon2')"><i class="fas fa-eye" id="icon2"></i></button>
            </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">Đặt lại mật khẩu</button>
    </form>

    <div class="back"><a href="login.html"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a></div>
</div>

<script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
        showMsg('Link không hợp lệ. Vui lòng yêu cầu lại.', 'error');
        document.getElementById('resetForm').style.display = 'none';
    }

    function togglePw(id, iconId) {
        const el = document.getElementById(id);
        const icon = document.getElementById(iconId);
        el.type = el.type === 'password' ? 'text' : 'password';
        icon.className = el.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
        el.style.display = 'block';
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) { showMsg('Mật khẩu không khớp!', 'error'); return; }
        if (newPassword.length < 8) { showMsg('Mật khẩu phải ít nhất 8 ký tự!', 'error'); return; }
        if (!/[A-Z]/.test(newPassword)) { showMsg('Mật khẩu phải có ít nhất 1 chữ hoa!', 'error'); return; }
        if (!/[a-z]/.test(newPassword)) { showMsg('Mật khẩu phải có ít nhất 1 chữ thường!', 'error'); return; }
        if (!/[0-9]/.test(newPassword)) { showMsg('Mật khẩu phải có ít nhất 1 số!', 'error'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();
            if (data.success) {
                showMsg('Đặt lại mật khẩu thành công! Đang chuyển hướng...', 'success');
                document.getElementById('resetForm').style.display = 'none';
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                showMsg(data.message || 'Có lỗi xảy ra!', 'error');
            }
        } catch {
            showMsg('Lỗi kết nối! Vui lòng thử lại.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Đặt lại mật khẩu';
        }
    });
</script>
</body>
</html>
