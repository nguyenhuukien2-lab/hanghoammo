<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - HangHoaMMO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            display: flex;
            height: 100vh;
        }

        /* Left Side - Brand */
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .auth-left::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
        }

        .auth-left::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 36px;
        }

        .brand-content h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .brand-content p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 50px;
        }

        .features-list {
            text-align: left;
            max-width: 400px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Right Side - Form */
        .auth-right {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .auth-form-container {
            width: 100%;
            max-width: 450px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6B7280;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #EF4444;
        }

        .form-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #6B7280;
            font-size: 15px;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 1.5px solid #E5E7EB;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #EF4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9CA3AF;
            cursor: pointer;
            padding: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #EF4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #DC2626;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .otp-section {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #FEF2F2;
            border-radius: 10px;
            border: 1px solid #FEE2E2;
        }

        .otp-section.active {
            display: block;
        }

        .otp-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #DC2626;
            font-size: 14px;
        }

        .otp-timer {
            font-weight: 600;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #6B7280;
            font-size: 14px;
        }

        .login-link a {
            color: #EF4444;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }

        .alert-error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }

        @media (max-width: 968px) {
            .auth-left {
                display: none;
            }
            
            .auth-right {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Left Side -->
        <div class="auth-left">
            <div class="brand-content">
                <div class="brand-logo">
                    🔑
                </div>
                <h1>Khôi phục tài khoản</h1>
                <p>Đặt lại mật khẩu của bạn</p>
                
                <div class="features-list">
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-shield-check"></i>
                        </div>
                        <span>Xác thực OTP qua Email</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-paper-plane"></i>
                        </div>
                        <span>Thông báo qua Telegram</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <span>OTP hết hạn sau 5 phút</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="auth-right">
            <div class="auth-form-container">
                <a href="login-new.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Quay lại đăng nhập
                </a>

                <div class="form-header">
                    <h2>Quên mật khẩu?</h2>
                    <p>Nhập email và số điện thoại để nhận mã OTP</p>
                </div>

                <div id="alertBox"></div>

                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="you@gmail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone input-icon"></i>
                            <input type="tel" id="phone" class="form-input" placeholder="0123456789" required>
                        </div>
                    </div>

                    <button type="button" id="requestOtpBtn" class="submit-btn">
                        <span>Gửi mã OTP</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>

                    <div id="otpSection" class="otp-section">
                        <div class="otp-info">
                            <i class="fas fa-info-circle"></i>
                            <span>Mã OTP đã được gửi. Hết hạn sau: <span class="otp-timer" id="otpTimer">5:00</span></span>
                        </div>

                        <div class="form-group">
                            <label>Mã OTP (6 số)</label>
                            <div class="input-wrapper">
                                <i class="fas fa-key input-icon"></i>
                                <input type="text" id="otpCode" class="form-input" placeholder="123456" maxlength="6" pattern="[0-9]{6}">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Mật khẩu mới</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="newPassword" class="form-input" placeholder="••••••••" minlength="6">
                                <button type="button" class="toggle-password" onclick="togglePassword('newPassword', 'toggleIcon1')">
                                    <i class="fas fa-eye" id="toggleIcon1"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Xác nhận mật khẩu</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" minlength="6">
                                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'toggleIcon2')">
                                    <i class="fas fa-eye" id="toggleIcon2"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="submit-btn">
                            <span>Đặt lại mật khẩu</span>
                            <i class="fas fa-check"></i>
                        </button>
                    </div>

                    <div class="login-link">
                        Nhớ mật khẩu? <a href="login-new.html">Đăng nhập ngay</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let otpTimer = null;
        let otpSent = false;

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertBox.innerHTML = '';
            }, 5000);
        }

        function startOtpTimer() {
            let timeLeft = 300; // 5 minutes
            const timerElement = document.getElementById('otpTimer');
            
            otpTimer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(otpTimer);
                    showAlert('Mã OTP đã hết hạn. Vui lòng yêu cầu mã mới.', 'error');
                    document.getElementById('otpSection').classList.remove('active');
                    document.getElementById('requestOtpBtn').style.display = 'flex';
                    otpSent = false;
                }
            }, 1000);
        }

        document.getElementById('requestOtpBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!email || !phone) {
                showAlert('Vui lòng nhập đầy đủ email và số điện thoại!', 'error');
                return;
            }

            const btn = this;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/request-forgot-password-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Mã OTP đã được gửi đến email và Telegram của bạn!', 'success');
                    document.getElementById('otpSection').classList.add('active');
                    btn.style.display = 'none';
                    otpSent = true;
                    startOtpTimer();
                } else {
                    showAlert(result.message || 'Gửi OTP thất bại!', 'error');
                    btn.innerHTML = '<span>Gửi mã OTP</span><i class="fas fa-paper-plane"></i>';
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('Lỗi kết nối! Vui lòng thử lại.', 'error');
                btn.innerHTML = '<span>Gửi mã OTP</span><i class="fas fa-paper-plane"></i>';
                btn.disabled = false;
            }
        });

        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!otpSent) {
                showAlert('Vui lòng yêu cầu mã OTP trước!', 'error');
                return;
            }

            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const otpCode = document.getElementById('otpCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!otpCode || otpCode.length !== 6) {
                showAlert('Vui lòng nhập mã OTP 6 số!', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showAlert('Mật khẩu phải có ít nhất 6 ký tự!', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        phone, 
                        otp: otpCode, 
                        newPassword 
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Đổi mật khẩu thành công! Đang chuyển đến trang đăng nhập...', 'success');
                    if (otpTimer) clearInterval(otpTimer);
                    setTimeout(() => {
                        window.location.href = 'login-new.html';
                    }, 2000);
                } else {
                    showAlert(result.message || 'Đổi mật khẩu thất bại!', 'error');
                    btn.innerHTML = '<span>Đặt lại mật khẩu</span><i class="fas fa-check"></i>';
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('Lỗi kết nối! Vui lòng thử lại.', 'error');
                btn.innerHTML = '<span>Đặt lại mật khẩu</span><i class="fas fa-check"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
