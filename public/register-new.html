<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HangHoaMMO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            display: flex;
            height: 100vh;
        }

        /* Left Side - Brand */
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .auth-left::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
        }

        .auth-left::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 36px;
        }

        .brand-content h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .brand-content p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 50px;
        }

        .features-list {
            text-align: left;
            max-width: 400px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Right Side - Form */
        .auth-right {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            overflow-y: auto;
        }

        .auth-form-container {
            width: 100%;
            max-width: 450px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6B7280;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #10B981;
        }

        .form-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #6B7280;
            font-size: 15px;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .required {
            color: #EF4444;
        }

        .optional {
            color: #6B7280;
            font-weight: 400;
        }

        .referral-benefits {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: #F0F9FF;
            border: 1px solid #BAE6FD;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #0369A1;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 1.5px solid #E5E7EB;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #10B981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9CA3AF;
            cursor: pointer;
            padding: 5px;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-top: 2px;
        }

        .terms-checkbox label {
            font-size: 14px;
            color: #374151;
            line-height: 1.5;
        }

        .terms-checkbox a {
            color: #10B981;
            text-decoration: none;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #6B7280;
            font-size: 14px;
        }

        .login-link a {
            color: #10B981;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 968px) {
            .auth-left {
                display: none;
            }
            
            .auth-right {
                flex: 1;
            }
        }

        /* Notification styles */
        .notification-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 10000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
        }

        .notification-message.show {
            opacity: 1;
            transform: translateX(0);
        }

        .notification-message.success {
            background: #10B981;
            color: white;
        }

        .notification-message.error {
            background: #EF4444;
            color: white;
        }

        .notification-message i {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Left Side -->
        <div class="auth-left">
            <div class="brand-content">
                <div class="brand-logo">
                    🚀
                </div>
                <h1>HangHoaMMO</h1>
                <p>Bắt đầu khám phá ngay hôm nay</p>
                
                <div class="features-list">
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-shield-check"></i>
                        </div>
                        <span>Bảo mật tuyệt đối</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <span>Giao hàng tự động 24/7</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-headset"></i>
                        </div>
                        <span>Bảo hành trọn đời</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="auth-right">
            <div class="auth-form-container">
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Về trang chủ
                </a>

                <div class="form-header">
                    <h2>Tạo tài khoản mới</h2>
                    <p>Đăng ký miễn phí trong 30 giây</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label>Họ và tên <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" name="name" class="form-input" placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" name="email" class="form-input" placeholder="you@gmail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('password', 'toggleIcon1')">
                                <i class="fas fa-eye" id="toggleIcon1"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Xác nhận mật khẩu <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'toggleIcon2')">
                                <i class="fas fa-eye" id="toggleIcon2"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mã giới thiệu <span class="optional">(Tùy chọn)</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-gift input-icon"></i>
                            <input type="text" id="referralCode" name="referralCode" class="form-input" placeholder="VD: REF123ABC">
                        </div>
                        <div class="referral-benefits">
                            <i class="fas fa-info-circle"></i>
                            <span>Nhập mã để người giới thiệu nhận hoa hồng khi bạn mua hàng</span>
                        </div>
                    </div>

                    <div class="terms-checkbox">
                        <input type="checkbox" id="agreeTerms" required>
                        <label for="agreeTerms">
                            Đồng ý với <a href="#">Điều khoản</a> & <a href="#">Bảo mật</a>
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">
                        <span>Tạo tài khoản</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="login-link">
                        Đã có tài khoản? <a href="login-new.html">Đăng nhập</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // Auto-fill referral code from URL parameter
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                document.getElementById('referralCode').value = refCode;
                // Highlight the referral field
                document.getElementById('referralCode').style.background = '#FEF3C7';
                document.getElementById('referralCode').style.borderColor = '#F59E0B';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone') || '',
                password: formData.get('password'),
                confirmPassword: formData.get('confirmPassword'),
                referralCode: formData.get('referralCode') || ''
            };

            if (data.password !== data.confirmPassword) {
                showErrorMessage('Mật khẩu không khớp!');
                return;
            }

            const btn = this.querySelector('.submit-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tạo tài khoản...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    // Lưu token và thông tin người dùng
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    
                    // Nếu có referral code, áp dụng sau khi đăng ký
                    if (data.referralCode) {
                        try {
                            await fetch('/api/reseller/apply-referral', {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${result.token}`
                                },
                                body: JSON.stringify({ referral_code: data.referralCode })
                            });
                        } catch (refError) {
                            console.log('Referral code error:', refError);
                            // Không hiển thị lỗi referral cho user, chỉ log
                        }
                    }
                    
                    // Hiển thị thông báo thành công
                    let successMsg = 'Đăng ký thành công! Chào mừng đến với HangHoaMMO!';
                    if (data.referralCode) {
                        successMsg += ' Mã giới thiệu đã được áp dụng!';
                    }
                    showSuccessMessage(successMsg);
                    
                    // Chuyển hướng sau 1.5 giây
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showErrorMessage(result.message || 'Đăng ký thất bại!');
                }
            } catch (error) {
                console.error('Register error:', error);
                showErrorMessage('Lỗi kết nối! Vui lòng thử lại.');
            } finally {
                btn.innerHTML = '<span>Tạo tài khoản</span><i class="fas fa-arrow-right"></i>';
                btn.disabled = false;
            }
        });

        // Hàm hiển thị thông báo thành công
        function showSuccessMessage(message) {
            const existingMsg = document.querySelector('.notification-message');
            if (existingMsg) existingMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'notification-message success';
            msgDiv.innerHTML = `
                <i class="fas fa-check-circle"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(msgDiv);
            
            setTimeout(() => msgDiv.classList.add('show'), 100);
            setTimeout(() => {
                msgDiv.classList.remove('show');
                setTimeout(() => msgDiv.remove(), 300);
            }, 3000);
        }

        // Hàm hiển thị thông báo lỗi
        function showErrorMessage(message) {
            const existingMsg = document.querySelector('.notification-message');
            if (existingMsg) existingMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'notification-message error';
            msgDiv.innerHTML = `
                <i class="fas fa-exclamation-circle"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(msgDiv);
            
            setTimeout(() => msgDiv.classList.add('show'), 100);
            setTimeout(() => {
                msgDiv.classList.remove('show');
                setTimeout(() => msgDiv.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
