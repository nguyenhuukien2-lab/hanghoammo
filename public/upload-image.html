<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Ảnh Sản Phẩm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #0066FF;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #0066FF;
            background: #eff6ff;
        }
        
        .upload-area.dragover {
            border-color: #0066FF;
            background: #eff6ff;
        }
        
        .upload-icon {
            font-size: 48px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #475569;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            color: #94a3b8;
            font-size: 13px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #0066FF;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #0052CC;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
        }
        
        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        
        .preview {
            margin-top: 20px;
            display: none;
        }
        
        .preview img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .result.success {
            background: #d1fae5;
            border: 1px solid #6ee7b7;
            color: #065f46;
        }
        
        .result.error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }
        
        .url-box {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
        }
        
        .copy-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .copy-btn:hover {
            background: #059669;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #0066FF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Upload Ảnh Sản Phẩm</h1>
        <p class="subtitle">Upload ảnh lên Supabase Storage và lấy URL</p>
        
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">☁️</div>
            <div class="upload-text">Click để chọn ảnh hoặc kéo thả vào đây</div>
            <div class="upload-hint">Hỗ trợ: JPG, PNG, WebP (Max 5MB)</div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        
        <div class="preview" id="preview">
            <img id="previewImg" src="" alt="Preview">
            <button class="btn" onclick="uploadImage()">Upload Ảnh</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Đang upload...</p>
        </div>
        
        <div class="result" id="result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase credentials
        const SUPABASE_URL = 'https://wjqahsmislryiuqfmyux.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqcWFoc21pc2xyeWl1cWZteXV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Nzk2MzgsImV4cCI6MjA4ODU1NTYzOH0.lmWlhC_iyfkS9brC23G_dulQhaC56YCTQtQfg93YGDk';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let selectedFile = null;
        
        // Drag and drop
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        function handleFile(file) {
            // Kiểm tra file type
            if (!file.type.startsWith('image/')) {
                showResult('error', 'Vui lòng chọn file ảnh!');
                return;
            }
            
            // Kiểm tra file size (5MB)
            if (file.size > 5 * 1024 * 1024) {
                showResult('error', 'File quá lớn! Vui lòng chọn ảnh < 5MB');
                return;
            }
            
            selectedFile = file;
            
            // Preview
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('result').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
        
        async function uploadImage() {
            if (!selectedFile) {
                showResult('error', 'Vui lòng chọn ảnh trước!');
                return;
            }
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                // Tạo tên file unique
                const timestamp = Date.now();
                const fileName = `${timestamp}-${selectedFile.name}`;
                
                // Upload
                const { data, error } = await supabase.storage
                    .from('product-images')
                    .upload(fileName, selectedFile, {
                        cacheControl: '3600',
                        upsert: false
                    });
                
                if (error) throw error;
                
                // Lấy public URL
                const { data: urlData } = supabase.storage
                    .from('product-images')
                    .getPublicUrl(fileName);
                
                const publicUrl = urlData.publicUrl;
                
                // Show success
                showResult('success', `
                    <strong>✅ Upload thành công!</strong>
                    <div class="url-box" id="urlBox">${publicUrl}</div>
                    <button class="copy-btn" onclick="copyUrl()">📋 Copy URL</button>
                `);
                
                // Reset
                selectedFile = null;
                document.getElementById('preview').style.display = 'none';
                document.getElementById('fileInput').value = '';
                
            } catch (error) {
                showResult('error', `❌ Lỗi: ${error.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function showResult(type, message) {
            const result = document.getElementById('result');
            result.className = `result ${type}`;
            result.innerHTML = message;
            result.style.display = 'block';
        }
        
        function copyUrl() {
            const urlBox = document.getElementById('urlBox');
            const url = urlBox.textContent;
            
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ Đã copy URL!');
            });
        }
    </script>
</body>
</html>
