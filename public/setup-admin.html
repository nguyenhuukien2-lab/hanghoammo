<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản Admin - HangHoaMMO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .credentials {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: left;
        }
        .credentials strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Tạo tài khoản Admin</h1>
        <p>Click nút bên dưới để tạo tài khoản admin cho HangHoaMMO</p>
        
        <button class="btn" id="createBtn" onclick="createAdmin()">
            Tạo Admin
        </button>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        async function createAdmin() {
            const btn = document.getElementById('createBtn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = 'Đang tạo...';
            result.style.display = 'none';
            
            try {
                const response = await fetch('/api/setup/create-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        secret: 'hanghoammo2025'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    result.className = 'result success';
                    result.innerHTML = `
                        <h3>✅ ${data.message}</h3>
                        <div class="credentials">
                            <p><strong>📧 Email:</strong> ${data.credentials.email}</p>
                            <p><strong>🔑 Password:</strong> ${data.credentials.password}</p>
                        </div>
                        <p style="margin-top: 15px;">
                            <a href="/" style="color: #667eea; text-decoration: none; font-weight: bold;">
                                → Đăng nhập ngay
                            </a>
                        </p>
                    `;
                } else {
                    result.className = 'result error';
                    result.innerHTML = `<h3>❌ Lỗi: ${data.message}</h3>`;
                }
                
                result.style.display = 'block';
                
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = `<h3>❌ Lỗi kết nối: ${error.message}</h3>`;
                result.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Tạo lại Admin';
            }
        }
    </script>
</body>
</html>
