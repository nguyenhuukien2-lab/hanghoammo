<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HangHoaMMO</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-page-2">
        <div class="register-left">
            <div class="register-info">
                <h1>Join HangHoaMMO</h1>
                <p>Create your account and start shopping for premium digital services</p>
                <div class="features">
                    <div class="feature">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure & Safe</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-bolt"></i>
                        <span>Instant Delivery</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-headset"></i>
                        <span>24/7 Support</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="register-right">
            <div class="register-form-container">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Fill in your information below</p>
                </div>

                <form id="registerForm2" class="register-form-2">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="name" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" name="phone" placeholder="Enter your phone number" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password" placeholder="Create a password" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" name="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>

                    <div class="form-checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="btn-register-2">
                        Create Account
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="form-divider">
                        <span>Already have an account?</span>
                    </div>

                    <a href="index.html" class="btn-login-link">Sign In</a>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm2').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                password: formData.get('password'),
                confirmPassword: formData.get('confirmPassword')
            };

            if (data.password !== data.confirmPassword) {
                showNotification('Password confirmation does not match!', 'error');
                return;
            }

            const btn = this.querySelector('.btn-register-2');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showNotification('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                showNotification(error.message || 'Registration failed!', 'error');
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        });
    </script>

    <style>
        .register-page-2 {
            min-height: 100vh;
            display: flex;
        }

        .register-left {
            flex: 1;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: white;
        }

        .register-info h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .register-info p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
        }

        .feature i {
            font-size: 20px;
            color: #3498db;
        }

        .register-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #f8f9fa;
        }

        .register-form-container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #7f8c8d;
            font-size: 16px;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-checkbox {
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .form-checkbox input[type="checkbox"] {
            margin-top: 4px;
        }

        .form-checkbox label {
            font-size: 14px;
            color: #7f8c8d;
            line-height: 1.4;
        }

        .form-checkbox a {
            color: #3498db;
            text-decoration: none;
        }

        .btn-register-2 {
            width: 100%;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-register-2:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.3);
        }

        .form-divider {
            text-align: center;
            margin: 20px 0;
            color: #7f8c8d;
            font-size: 14px;
        }

        .btn-login-link {
            display: block;
            width: 100%;
            text-align: center;
            padding: 12px;
            border: 2px solid #3498db;
            color: #3498db;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login-link:hover {
            background: #3498db;
            color: white;
        }

        @media (max-width: 768px) {
            .register-page-2 {
                flex-direction: column;
            }
            
            .register-left {
                padding: 30px 20px;
            }
            
            .register-info h1 {
                font-size: 32px;
            }
            
            .features {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 15px;
            }
        }
    </style>
</body>
</html>
